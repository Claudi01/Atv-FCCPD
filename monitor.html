<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento - E-commerce</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e2e; color: #fff; text-align: center; padding: 50px; }
        h1 { margin-bottom: 40px; }
        .grid { display: flex; justify-content: center; gap: 20px; }
        .card { padding: 30px; border-radius: 10px; min-width: 200px; font-size: 24px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .up { background-color: #28a745; box-shadow: 0 0 15px #28a745; }
        .down { background-color: #dc3545; box-shadow: 0 0 15px #dc3545; }
        .failures { display: block; font-size: 14px; margin-top: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <h1>Painel de Monitoramento (API Gateway)</h1>
    <div class="grid" id="painel">
        Carregando status dos microsserviços...
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('http://localhost:5000/status');
                const data = await response.json();
                
                let html = '';
                for (const [name, info] of Object.entries(data)) {
                    const statusClass = info.status === 'up' ? 'up' : 'down';
                    const statusText = info.status === 'up' ? 'ONLINE' : 'OFFLINE';
                    html += `
                        <div class="card ${statusClass}">
                            ${name}
                            <div style="font-size: 18px; margin-top: 10px;">${statusText}</div>
                            <span class="failures">Falhas consecutivas: ${info.failures}</span>
                        </div>
                    `;
                }
                document.getElementById('painel').innerHTML = html;
            } catch (error) {
                document.getElementById('painel').innerHTML = '<div class="card down">GATEWAY OFFLINE</div>';
            }
        }

        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>
</html>
